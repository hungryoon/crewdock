# Hermes runtime — official NousResearch image.
# Pinned to the latest tagged release (stable), by digest for reproducibility.
# To bump: pick a newer vYYYY.M.D tag from Docker Hub, resolve its digest, repin here.
# This is only the DEFAULT for new instances; existing instances keep their own
# pin (see `crew update --image/--rollback/--to-default`).
type: hermes
image: nousresearch/hermes-agent:v2026.6.19@sha256:9f367c7756ef087661a361536a89f438d57a122b958dc23d82d456b1433e6e9e
run_command: ["gateway", "run"]
data_mount: /opt/data
layers_mount: /opt/shared
dashboard:
  container_port: 9119
  host: 127.0.0.1
  path: /
  port_env: HERMES_DASHBOARD_PORT
# Bridge networking (default when network_mode is absent) puts each instance in
# its own network namespace, so it cannot reach the host router at 127.0.0.1:9400
# to spoof identity. The dashboard binds 0.0.0.0 INSIDE the container so docker's
# port-map reaches it; Hermes' own auth gate is disabled (INSECURE=1) because the
# host publishes ONLY on 127.0.0.1 (template: 127.0.0.1:${CREW_PORT}:9119), each
# instance gets its own per-compose-project bridge network, and crewdock's
# gateway SSO is the real auth in front.
env:
  HERMES_DASHBOARD: "1"
  HERMES_DASHBOARD_HOST: "0.0.0.0"
  HERMES_DASHBOARD_INSECURE: "1"
passthrough_env:
  - HERMES_UID
  - HERMES_GID
  - HERMES_DASHBOARD_SESSION_TOKEN
# crewdock fills these with the host uid/gid at create time so the container
# (which starts as root) drops privileges to the host user — keeps the
# bind-mounted data/ host-owned so `crew rm --purge` never hits root residue.
host_user_env:
  uid: HERMES_UID
  gid: HERMES_GID
credentials:
  llm:
    inherit_from_shared: true
resources:
  mem_limit: 4g
  cpus: 2
  shm_size: 1g
seed_config: seed/config.yaml
migration:
  min_data_version: null
  hook: null
